[pytest]
minversion = 6.0
addopts = -v --tb=short -m "not slow" --ignore=tests/db_global_tests.py --cov=. --cov-report=html:htmlcov --cov-report=xml --cov-report=term-missing --cov-fail-under=85 --html=test-results/report.html --self-contained-html --junitxml=test-results/junit.xml -n auto --maxfail=5
testpaths =
    tests
    tests/architecture
    tests/unit
    tests/integration
    tests/performance
    tests/gui
    tests/security
    tests/e2e
python_files = test_*.py *_test.py
python_classes = Test* *Test *Tests
python_functions = test_*


markers =
    slow: marks tests as slow (excluded by default, use -m "slow" to run)
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    external: marks tests that require external services
    database: marks tests that require database
    performance: marks tests that measure performance
    timeout: marks tests with custom timeout settings
    gui: marks tests that require GUI components
    security: marks tests related to security features
    accessibility: marks tests for accessibility compliance
    benchmark: marks tests for performance benchmarking
    memory: marks tests for memory usage analysis
    load: marks tests for load and concurrency testing
    architecture: marks architecture/layer-boundary tests (run with -m architecture)
    stability_gate: marks tests included in scripts/stability_gate.py

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
    ignore::ResourceWarning



# Coverage configuration
[coverage:run]
source = .
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */build/*
    */dist/*
    */.tox/*
    */site-packages/*
    */lib/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\\bProtocol\\):
    @(abc\\.)?abstractmethod

[coverage:html]
directory = htmlcov

# Benchmark configuration
[tool:pytest-benchmark]
min_rounds = 5
max_time = 1.0
min_time = 0.000005
calibration_precision = 10
warmup = true
warmup_iterations = 100000

# Parallel testing
[tool:pytest-xdist]
rsyncdirs = tests