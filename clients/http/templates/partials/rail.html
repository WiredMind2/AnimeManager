<button
  type="button"
  class="rail-backdrop"
  data-menu-backdrop
  aria-hidden="true"
  tabindex="-1"
></button>
<aside id="primary-rail" class="rail" aria-label="Primary">
  <a href="{{ url_for('web_library') }}" class="rail__brand" data-menu-close-on-nav>
    <span class="rail__brand-mark">Anime<span class="rail__brand-accent">.</span></span>
    <span class="rail__brand-tag">manager</span>
  </a>

  <nav class="rail__group" aria-label="Library">
    <span class="rail__group-label">Library</span>
    <a
      href="{{ url_for('web_library') }}"
      class="rail__link {% if active_nav == 'library' %}is-active{% endif %}"
    >
      {# Icon: grid #}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <rect x="3" y="3" width="7" height="7" rx="1.5" />
        <rect x="14" y="3" width="7" height="7" rx="1.5" />
        <rect x="3" y="14" width="7" height="7" rx="1.5" />
        <rect x="14" y="14" width="7" height="7" rx="1.5" />
      </svg>
      Browser
    </a>
    <a
      href="{{ url_for('web_library') }}?filter=WATCHING"
      class="rail__link {% if active_filter == 'WATCHING' %}is-active{% endif %}"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z" />
        <circle cx="12" cy="12" r="3" />
      </svg>
      Watching
    </a>
    <a
      href="{{ url_for('web_library') }}?filter=WATCHLIST"
      class="rail__link {% if active_filter == 'WATCHLIST' %}is-active{% endif %}"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M5 4h14a1 1 0 0 1 1 1v15l-8-4-8 4V5a1 1 0 0 1 1-1z" />
      </svg>
      Watchlist
    </a>
    <a
      href="{{ url_for('web_library') }}?filter=SEEN"
      class="rail__link {% if active_filter == 'SEEN' %}is-active{% endif %}"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M5 12l4 4L19 6" />
      </svg>
      Seen
    </a>
    <a
      href="{{ url_for('web_library') }}?filter=LIKED"
      class="rail__link {% if active_filter == 'LIKED' %}is-active{% endif %}"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z" />
      </svg>
      Liked
    </a>
  </nav>

  <nav class="rail__group" aria-label="Workflow">
    <span class="rail__group-label">Workflow</span>
    <a
      href="{{ url_for('web_torrents') }}"
      class="rail__link {% if active_nav == 'torrents' %}is-active{% endif %}"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M12 3v12" />
        <path d="M6 9l6 6 6-6" />
        <path d="M5 21h14" />
      </svg>
      Torrent search
    </a>
    <a
      href="{{ url_for('web_downloads') }}"
      class="rail__link {% if active_nav == 'downloads' %}is-active{% endif %}"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M4 14a4 4 0 0 1 .9-7.9 5 5 0 0 1 9.7-1A5 5 0 0 1 20 14" />
        <path d="M12 12v8" />
        <path d="M9 17l3 3 3-3" />
      </svg>
      Downloads
    </a>
  </nav>

  <nav class="rail__group" aria-label="System">
    <span class="rail__group-label">System</span>
    <a
      href="{{ url_for('web_logs') }}"
      class="rail__link {% if active_nav == 'logs' %}is-active{% endif %}"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M4 5h16" />
        <path d="M4 10h10" />
        <path d="M4 15h16" />
        <path d="M4 20h8" />
      </svg>
      Logs
    </a>
    <a
      href="{{ url_for('web_settings') }}"
      class="rail__link {% if active_nav == 'settings' %}is-active{% endif %}"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="12" cy="12" r="3" />
        <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9c.4.6 1 1 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z" />
      </svg>
      Settings
    </a>
    <a
      href="/docs"
      class="rail__link"
      target="_blank"
      rel="noreferrer"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M4 4h12a4 4 0 0 1 4 4v12H8a4 4 0 0 1-4-4z" />
        <path d="M8 8h8" />
        <path d="M8 12h6" />
      </svg>
      API docs
    </a>
  </nav>

  <div class="rail__footer">
    Embedded SDK • peer client<br />
    <span style="opacity: 0.7">ADR 0001 / 0006</span>
  </div>
</aside>
