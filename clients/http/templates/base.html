<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="am-libass-js"
      content="{{ url_for('web_static', path='vendor/libass-wasm/package/dist/js/') }}"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0e0f11" />
    <title>{% block title %}AnimeManager{% endblock %}</title>
    {# -- Progressive Web App (manifest + iOS-specific hints) -- #}
    <link
      rel="manifest"
      href="{{ url_for('web_manifest') }}"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="{{ url_for('web_static', path='icons/icon-192.png') }}"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="{{ url_for('web_static', path='icons/icon-512.png') }}"
    />
    <link
      rel="apple-touch-icon"
      sizes="192x192"
      href="{{ url_for('web_static', path='icons/icon-192.png') }}"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="AnimeManager" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="AnimeManager" />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('web_static', path='css/app.css') }}"
    />
    <script
      src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"
      defer
    ></script>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/media-chrome@4/+esm"
    ></script>
    <script
      defer
      src="{{ url_for('web_static', path='vendor/libass-wasm/package/dist/js/subtitles-octopus.js') }}"
    ></script>
    <script
      defer
      src="{{ url_for('web_static', path='js/am_playback_subtitles.js') }}"
    ></script>
    <script
      src="{{ url_for('web_static', path='js/app.js') }}"
      defer
    ></script>
    <script
      src="{{ url_for('web_static', path='js/pwa-register.js') }}"
      defer
    ></script>
    <script
      src="{{ url_for('web_static', path='js/pwa-install.js') }}"
      defer
    ></script>
  </head>
  <body>
    <div class="shell">
      {% include "partials/rail.html" %}
      <main class="main">
        {% block topbar %}
          {% include "partials/topbar.html" %}
        {% endblock %}
        <div class="content">
          {% if flash %}
            <div class="flash flash--{{ flash.kind }}">{{ flash.message }}</div>
          {% endif %}
          {% block content %}{% endblock %}
        </div>
      </main>
    </div>
  </body>
</html>
